[defaults]
# Инвентарь
inventory = inventory

vault_password_file = .vault_pass
host_key_checking = True

# Формат вывода
stdout_callback = default

# ТАЙМАУТЫ для надёжности при временных проблемах с сетью
timeout = 60
gather_timeout = 30

forks = 5
retry_files_enabled = False

# Кеш фактов — ускоряет повторные запуски
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/.ansible_facts_cache
fact_caching_timeout = 3600

deprecation_warnings = False
display_skipped_hosts = False

# По умолчанию все задачи требуют root через sudo
[privilege_escalation]
become = True
become_method = sudo
become_user = root

# Оптимизации SSH (persistent control master)
[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

---
- name: "Install security monitoring script"
  ansible.builtin.copy:
    src: monitor_security.sh
    dest: "{{ mon_base_dir }}/bin/monitor_security.sh"
    owner: root
    group: "{{ mon_group }}"
    mode: '0750'
    backup: true

- name: "Install security systemd units"
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    owner: root
    group: root
    mode: '0644'
  loop:
    - monitor-security.service
    - monitor-security.timer
  notify: reload security systemd

- name: "Enable security timer"
  ansible.builtin.systemd:
    name: monitor-security.timer
    enabled: true
    state: started
    daemon_reload: true

- name: "Run security check now"
  ansible.builtin.command: "{{ mon_base_dir }}/bin/monitor_security.sh"
  changed_when: false
  failed_when: false
  check_mode: false
  tags: [run_once, verify]

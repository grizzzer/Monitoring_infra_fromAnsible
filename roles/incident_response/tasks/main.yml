---
- name: "Install extended incident-response script inherited from v1"
  ansible.builtin.copy:
    src: monitor_incidents.sh
    dest: "{{ mon_base_dir }}/bin/monitor_incidents.sh"
    owner: root
    group: "{{ mon_group }}"
    mode: '0750'
    backup: true

- name: "Install incident-response units"
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    owner: root
    group: root
    mode: '0644'
  loop:
    - monitor-incidents.service
    - monitor-incidents.timer
  notify: reload incident systemd

- name: "Enable incident-response timer"
  ansible.builtin.systemd:
    name: monitor-incidents.timer
    enabled: true
    state: started
    daemon_reload: true

- name: "Run extended incident checks now"
  ansible.builtin.command: "{{ mon_base_dir }}/bin/monitor_incidents.sh"
  changed_when: false
  failed_when: false
  check_mode: false
  tags: [run_once, verify]
